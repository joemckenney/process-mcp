name: Release binaries

# Triggered when release-plz pushes a v* tag (after the release PR is
# merged). Builds Linux x86_64 and aarch64 binaries with `cross` and
# uploads tarballs to the existing GitHub Release created by release-plz.

on:
  push:
    tags: ['v*']
  # Manual override so we can rebuild binaries for an existing tag
  # without re-tagging. Dispatch against `main` and pass the tag as
  # input. (Dispatching against the tag itself fails when the tag
  # predates this trigger being added to the file.)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write  # required to upload assets to the release

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For tag-push: defaults to the pushed tag. For workflow_dispatch
          # against main: uses the user-provided tag input so we build
          # from the right source commit.
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        # `cross` runs the build inside a Docker container with the right
        # cross-linkers, which avoids us having to install gcc-aarch64 etc.
        # by hand. Same toolchain handles both x86_64 and aarch64 targets.
        run: cargo install cross --locked --version 0.2.5

      - name: Build release binary
        run: cross build --release --target ${{ matrix.target }} --locked

      - name: Package archive
        env:
          # Source the tag from input on manual dispatch, otherwise from
          # the pushed ref. Use this for both the tarball name and the
          # upload target.
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          pkg_name="process-mcp-${TAG}-${{ matrix.target }}"
          mkdir -p "$pkg_name"
          cp "target/${{ matrix.target }}/release/process-mcp" "$pkg_name/"
          tar -czf "${pkg_name}.tar.gz" "$pkg_name"
          # Generate a sha256 for verifiability.
          sha256sum "${pkg_name}.tar.gz" > "${pkg_name}.tar.gz.sha256"
          echo "ARCHIVE=${pkg_name}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=${pkg_name}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # Required when triggered manually: tag != current ref.
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.CHECKSUM }}
